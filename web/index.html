<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Sistema Integral de Control de Accesos Vehiculares y Peatonales — Nivel Táctico">
  <meta name="theme-color" content="#0A0E14">
  <meta name="robots" content="noindex, nofollow">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SecurPass">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SecurPass Tactical</title>
  <link rel="manifest" href="manifest.json">

  <!-- Pantalla de carga táctica -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0A0E14;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      color: #8B9AB2;
    }
    .shield {
      width: 64px;
      height: 64px;
      color: #1A6BFF;
      opacity: 0.8;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    .loading-text {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #4A5568;
    }
  </style>
</head>
<body>
  <div id="loading">
    <svg class="shield" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
    </svg>
    <span class="loading-text">SECURPASS TACTICAL</span>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Ocultar splash cuando Flutter esté listo
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
</body>
</html>
